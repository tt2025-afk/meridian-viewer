<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>十四經脈圖鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf6ee;
  --gold: #a67c00;
  --gold-lt: #d4a017;
  --border: #e0d0a8;
  --text: #2c1f0e;
  --text2: #7a6040;
  --panel: #fffdf5;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Header ── */
.hdr {
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
padding: 0.9rem 1rem 0.5rem;
background: var(–panel);
border-bottom: 1px solid var(–border);
gap: 0.6rem;
}
.hdr-title {
font-family: ‘Noto Serif TC’, serif;
font-size: 1.3rem;
font-weight: 600;
letter-spacing: 0.2em;
color: var(–gold);
}
.hdr-sub {
font-size: 0.72rem;
color: var(–text2);
letter-spacing: 0.06em;
}

/* ── Group Tabs ── */
.tabs-wrap {
flex-shrink: 0;
background: var(–panel);
border-bottom: 1px solid var(–border);
overflow-x: auto;
white-space: nowrap;
padding: 0.5rem 0.8rem;
scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
display: inline-block;
padding: 0.32rem 0.85rem;
margin-right: 0.4rem;
border-radius: 20px;
font-size: 0.8rem;
font-weight: 500;
cursor: pointer;
border: 1px solid var(–border);
background: transparent;
color: var(–text2);
transition: all 0.2s;
white-space: nowrap;
}
.tab.active {
background: var(–gold);
color: #fff;
border-color: var(–gold);
}

/* ── Meridian Pills Row ── */
.pills-wrap {
flex-shrink: 0;
overflow-x: auto;
white-space: nowrap;
padding: 0.5rem 0.8rem;
background: var(–bg);
border-bottom: 1px solid var(–border);
scrollbar-width: none;
}
.pills-wrap::-webkit-scrollbar { display: none; }
.pill {
display: inline-flex;
align-items: center;
gap: 0.35rem;
padding: 0.3rem 0.75rem;
margin-right: 0.5rem;
border-radius: 20px;
font-size: 0.82rem;
font-weight: 500;
cursor: pointer;
border: 1.5px solid transparent;
background: rgba(255,255,255,0.7);
color: var(–text);
transition: all 0.18s;
white-space: nowrap;
}
.pill .dot {
width: 8px; height: 8px;
border-radius: 50%;
flex-shrink: 0;
}
.pill.active {
background: #fff;
font-weight: 600;
}

/* ── Body Canvas ── */
.canvas-area {
flex: 1;
min-height: 0;
position: relative;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(160deg, #fffdf7 0%, #f5ede0 100%);
}
.canvas-area::before {
content: ‘’;
position: absolute;
inset: 0;
background: radial-gradient(ellipse at 50% 40%, rgba(184,134,11,0.06) 0%, transparent 65%);
pointer-events: none;
}
#bodySvg {
display: block;
width: auto;
height: 100%;
max-width: 100%;
max-height: 100%;
filter: drop-shadow(0 4px 20px rgba(184,134,11,0.1));
touch-action: none;
}

/* ── Bottom Sheet ── */
.sheet-backdrop {
display: none;
position: fixed;
inset: 0;
background: rgba(44,31,14,0.25);
z-index: 10;
}
.sheet-backdrop.show { display: block; }

.sheet {
position: fixed;
bottom: 0; left: 0; right: 0;
background: var(–panel);
border-radius: 20px 20px 0 0;
box-shadow: 0 -4px 30px rgba(44,31,14,0.12);
z-index: 20;
transform: translateY(100%);
transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
max-height: 72dvh;
display: flex;
flex-direction: column;
padding-bottom: calc(1rem + var(–safe-bottom));
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
flex-shrink: 0;
display: flex;
justify-content: center;
padding: 0.8rem 0 0.4rem;
cursor: pointer;
}
.sheet-handle::before {
content: ‘’;
width: 36px; height: 4px;
background: var(–border);
border-radius: 2px;
}

.sheet-head {
flex-shrink: 0;
padding: 0 1.2rem 0.8rem;
border-bottom: 1px solid var(–border);
display: flex;
align-items: baseline;
gap: 0.7rem;
}
.sheet-title {
font-family: ‘Noto Serif TC’, serif;
font-size: 1.35rem;
font-weight: 700;
color: var(–text);
}
.badge {
padding: 0.12rem 0.6rem;
border-radius: 12px;
font-size: 0.72rem;
font-weight: 600;
}
.badge.yin  { background: #ffe0e0; color: #8b0000; }
.badge.yang { background: #ddeeff; color: #004080; }
.badge.qi   { background: #eeddf5; color: #5a0080; }

.sheet-body {
flex: 1;
overflow-y: auto;
padding: 1rem 1.2rem;
-webkit-overflow-scrolling: touch;
}
.sheet-body::-webkit-scrollbar { display: none; }

.info-row { margin-bottom: 1.1rem; }
.lbl {
font-size: 0.7rem;
color: var(–text2);
letter-spacing: 0.1em;
text-transform: uppercase;
margin-bottom: 0.25rem;
display: flex;
align-items: center;
gap: 0.35rem;
}
.lbl::before {
content: ‘’;
display: inline-block;
width: 12px; height: 2px;
background: var(–gold-lt);
border-radius: 1px;
}
.val {
font-size: 0.92rem;
color: var(–text);
line-height: 1.65;
}
.acu-grid {
display: flex;
flex-wrap: wrap;
gap: 0.35rem;
margin-top: 0.3rem;
}
.acu-tag {
padding: 0.2rem 0.55rem;
background: rgba(166,124,0,0.07);
border: 1px solid rgba(166,124,0,0.18);
border-radius: 4px;
font-size: 0.8rem;
color: var(–gold);
}

/* ── Info button on canvas ── */
.info-fab {
position: absolute;
bottom: 1rem; right: 1rem;
width: 48px; height: 48px;
background: var(–gold);
border: none;
border-radius: 50%;
color: #fff;
font-size: 1.2rem;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
box-shadow: 0 3px 16px rgba(166,124,0,0.35);
z-index: 5;
transition: transform 0.15s;
}
.info-fab:active { transform: scale(0.93); }

/* ── Animations ── */
@keyframes drawPath {
from { stroke-dashoffset: 2000; }
to   { stroke-dashoffset: 0; }
}
.meridian-line {
stroke-dasharray: 2000;
stroke-dashoffset: 2000;
animation: drawPath 1.1s ease-out forwards;
}
@keyframes pulse {
0%,100% { r: 3.5; opacity: 0.9; }
50%      { r: 5.5; opacity: 0.45; }
}
.acu-pulse { animation: pulse 2s ease-in-out infinite; }

/* ── Desktop fallback ── */
@media (min-width: 768px) {
body { overflow: auto; height: auto; }
.canvas-area { min-height: 70vh; }
.sheet {
position: static;
transform: none !important;
border-radius: 0;
max-height: none;
box-shadow: none;
border-top: 1px solid var(–border);
}
.sheet-handle { display: none; }
.sheet-backdrop { display: none !important; }
}
</style>

</head>

const groups = [
  { label:'手三陰', keys:['肺經','心經','心包經'] },
  { label:'手三陽', keys:['大腸經','小腸經','三焦經'] },
  { label:'足三陰', keys:['脾經','腎經','肝經'] },
  { label:'足三陽', keys:['胃經','膀胱經','膽經'] },
  { label:'奇經', keys:['督脈','任脈'] }
];

const byKey = {};
meridians.forEach(m => byKey[m.key] = m);

let currentGroup = 0;
let currentKey = '肺經';
let sheetOpen = false;

// ── Build Tabs ──
const tabsWrap = document.getElementById('tabsWrap');
groups.forEach((g, i) => {
  const t = document.createElement('button');
  t.className = 'tab' + (i === 0 ? ' active' : '');
  t.textContent = g.label;
  t.addEventListener('click', () => switchGroup(i));
  tabsWrap.appendChild(t);
});

// ── Build Pills ──
function renderPills(groupIdx) {
  const pillsWrap = document.getElementById('pillsWrap');
  pillsWrap.innerHTML = '';
  groups[groupIdx].keys.forEach(k => {
    const m = byKey[k];
    const p = document.createElement('button');
    p.className = 'pill' + (k === currentKey ? ' active' : '');
    p.style.borderColor = k === currentKey ? m.color : 'transparent';
    p.innerHTML = `<span class="dot" style="background:${m.color}"></span>${m.name}`;
    p.addEventListener('click', () => selectMeridian(k));
    pillsWrap.appendChild(p);
  });
}

function switchGroup(i) {
  currentGroup = i;
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j===i));
  // 自動選該群組第一條
  const firstKey = groups[i].keys[0];
  selectMeridian(firstKey);
  renderPills(i);
}

// ── Select Meridian ──
function selectMeridian(key) {
  currentKey = key;
  const m = byKey[key];

  // Pills 更新
  renderPills(currentGroup);

  // 繪製路徑
  const layer = document.getElementById('meridianLayer');
  const acuLayer = document.getElementById('acuLayer');
  layer.innerHTML = '';
  acuLayer.innerHTML = '';

  // 督脈背面虛線
  if (m.pathBack) {
    const glowBack = document.createElementNS('http://www.w3.org/2000/svg','path');
    glowBack.setAttribute('d', m.pathBack); glowBack.setAttribute('stroke', m.color);
    glowBack.setAttribute('stroke-width', '8'); glowBack.setAttribute('fill', 'none');
    glowBack.setAttribute('opacity', '0.1'); glowBack.setAttribute('stroke-linecap', 'round');
    layer.appendChild(glowBack);
    const lineBack = document.createElementNS('http://www.w3.org/2000/svg','path');
    lineBack.setAttribute('d', m.pathBack); lineBack.setAttribute('stroke', m.color);
    lineBack.setAttribute('stroke-width', '2.5'); lineBack.setAttribute('fill', 'none');
    lineBack.setAttribute('opacity', '0.55'); lineBack.setAttribute('stroke-dasharray', '6 4');
    lineBack.setAttribute('stroke-linecap', 'round'); lineBack.setAttribute('class', 'meridian-line');
    layer.appendChild(lineBack);
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x','176'); lbl.setAttribute('y','390');
    lbl.setAttribute('font-size','8'); lbl.setAttribute('fill', m.color);
    lbl.setAttribute('opacity','0.65'); lbl.setAttribute('font-family','Noto Sans TC,sans-serif');
    lbl.textContent = '← 背面'; layer.appendChild(lbl);
  }

  const glow = document.createElementNS('http://www.w3.org/2000/svg','path');
  glow.setAttribute('d', m.path); glow.setAttribute('stroke', m.color);
  glow.setAttribute('stroke-width', '10'); glow.setAttribute('fill', 'none');
  glow.setAttribute('opacity', '0.15'); glow.setAttribute('stroke-linecap', 'round');
  layer.appendChild(glow);

  const line = document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d', m.path); line.setAttribute('stroke', m.color);
  line.setAttribute('stroke-width', '3'); line.setAttribute('fill', 'none');
  line.setAttribute('opacity', '0.9'); line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('class', 'meridian-line');
  layer.appendChild(line);

  m.ac.forEach(([cx, cy, name, dir, isBack], i) => {
    const halo = document.createElementNS('http://www.w3.org/2000/svg','circle');
    halo.setAttribute('cx', cx); halo.setAttribute('cy', cy);
    halo.setAttribute('r', 7); halo.setAttribute('fill', m.color);
    halo.setAttribute('opacity', isBack ? '0.08' : '0.12');
    acuLayer.appendChild(halo);

    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
    dot.setAttribute('r', 3.5); dot.setAttribute('fill', m.color);
    dot.setAttribute('class','acu-pulse');
    dot.setAttribute('opacity', isBack ? '0.5' : '1');
    dot.style.animationDelay = `${i*0.13}s`;
    acuLayer.appendChild(dot);

    if (name) {
      const tx = dir === 'l' ? cx - 11 : cx + 11;
      const ty = cy + 3.5;
      const anchor = dir === 'l' ? 'end' : 'start';
      const bg = document.createElementNS('http://www.w3.org/2000/svg','text');
      bg.setAttribute('x', tx); bg.setAttribute('y', ty);
      bg.setAttribute('text-anchor', anchor); bg.setAttribute('font-size', '8.5');
      bg.setAttribute('font-family','Noto Sans TC,sans-serif'); bg.setAttribute('font-weight','600');
      bg.setAttribute('fill','white'); bg.setAttribute('stroke','white');
      bg.setAttribute('stroke-width','3'); bg.setAttribute('stroke-linejoin','round');
      bg.setAttribute('opacity', isBack ? '0.4' : '0.85');
      bg.textContent = name; acuLayer.appendChild(bg);
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', tx); txt.setAttribute('y', ty);
      txt.setAttribute('text-anchor', anchor); txt.setAttribute('font-size', '8.5');
      txt.setAttribute('font-family','Noto Sans TC,sans-serif'); txt.setAttribute('font-weight','600');
      txt.setAttribute('fill', m.color); txt.setAttribute('opacity', isBack ? '0.55' : '1');
      txt.textContent = name; acuLayer.appendChild(txt);
    }
  });

  // 更新 sheet 內容
  const bc = m.type==='yin'?'yin':m.type==='yang'?'yang':'qi';
  const tl = m.type==='yin'?'陰經':m.type==='yang'?'陽經':'奇經';
  document.getElementById('sheetHead').innerHTML = `
    <span class="sheet-title">${m.name}</span>
    <span class="badge ${bc}">${tl}・${m.points.length} 穴</span>`;
  document.getElementById('sheetBody').innerHTML = `
    <div class="info-row">
      <div class="lbl">起點穴道</div>
      <div class="val">${m.start}</div>
    </div>
    <div class="info-row">
      <div class="lbl">終點穴道</div>
      <div class="val">${m.end}</div>
    </div>
    <div class="info-row">
      <div class="lbl">走向說明</div>
      <div class="val">${m.direction}</div>
    </div>
    <div class="info-row">
      <div class="lbl">穴道列表</div>
      <div class="acu-grid">${m.points.map(p=>`<span class="acu-tag">${p}</span>`).join('')}</div>
    </div>`;
}

// ── Sheet Toggle ──
function openSheet() {
  sheetOpen = true;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
}
function closeSheet() {
  sheetOpen = false;
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}

document.getElementById('infoFab').addEventListener('click', () => {
  sheetOpen ? closeSheet() : openSheet();
});
document.getElementById('backdrop').addEventListener('click', closeSheet);
document.getElementById('sheetHandle').addEventListener('click', closeSheet);

// 初始化
renderPills(0);
selectMeridian('肺經');
</script>
