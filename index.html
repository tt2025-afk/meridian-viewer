<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>十四經脈圖鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --gold: #a67c00;
  --gold-lt: #d4a017;
  --border: #ddd0b0;
  --text: #2c1f0e;
  --text2: #7a6040;
  --panel: #fffdf5;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Header ── */
.hdr {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 1rem 0.5rem;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  gap: 0.6rem;
}
.hdr-left { display: flex; flex-direction: column; }
.hdr-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.2rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  color: var(--gold);
}
.hdr-sub { font-size: 0.68rem; color: var(--text2); letter-spacing: 0.04em; }

/* ── 搜尋欄 ── */
.search-wrap {
  display: flex;
  align-items: center;
  background: #f0ead8;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 0.3rem 0.7rem;
  gap: 0.4rem;
  flex: 1;
  max-width: 200px;
}
.search-wrap svg { flex-shrink:0; color: var(--text2); }
#searchInput {
  border: none;
  background: transparent;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem;
  color: var(--text);
  width: 100%;
  outline: none;
}
#searchInput::placeholder { color: var(--text2); }

/* 搜尋建議下拉 */
.suggest-box {
  position: absolute;
  top: 100%;
  right: 0;
  width: 200px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  z-index: 100;
  max-height: 200px;
  overflow-y: auto;
  display: none;
}
.suggest-box.show { display: block; }
.suggest-item {
  padding: 0.5rem 0.8rem;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: background 0.15s;
}
.suggest-item:hover { background: rgba(166,124,0,0.08); }
.suggest-item .s-meridian { font-size: 0.7rem; color: var(--text2); }
.hdr-right { position: relative; flex:1; max-width:200px; display:flex; }

/* ── Group Tabs ── */
.tabs-wrap {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  white-space: nowrap;
  padding: 0.45rem 0.8rem;
  scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
  display: inline-block;
  padding: 0.28rem 0.8rem;
  margin-right: 0.4rem;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active { background: var(--gold); color: #fff; border-color: var(--gold); }

/* ── Meridian Pills ── */
.pills-wrap {
  flex-shrink: 0;
  overflow-x: auto;
  white-space: nowrap;
  padding: 0.45rem 0.8rem;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  scrollbar-width: none;
}
.pills-wrap::-webkit-scrollbar { display: none; }
.pill {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.28rem 0.7rem;
  margin-right: 0.5rem;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid transparent;
  background: rgba(255,255,255,0.7);
  color: var(--text);
  transition: all 0.18s;
  white-space: nowrap;
}
.pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pill.active { background: #fff; font-weight: 600; }

/* ── 背面切換按鈕（督脈/膀胱經用）── */
.view-toggle {
  position: absolute;
  top: 0.6rem; left: 0.6rem;
  display: none;
  gap: 0.3rem;
  z-index: 6;
}
.view-toggle.show { display: flex; }
.vtbtn {
  padding: 0.25rem 0.65rem;
  border-radius: 12px;
  font-size: 0.75rem;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--panel);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.vtbtn.active { background: var(--gold); color: #fff; border-color: var(--gold); }

/* ── Body Canvas ── */
.canvas-area {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f0e8;
}
.svg-wrap {
  position: relative;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
#bodySvg {
  display: block;
  height: 100%;
  width: auto;
  max-width: 100vw;
}

/* ── 搜尋模式高亮圈 ── */
.search-highlight {
  animation: searchPulse 1.5s ease-in-out infinite;
}
@keyframes searchPulse {
  0%,100% { r: 10; opacity:0.9; }
  50%      { r: 16; opacity:0.4; }
}

/* ── Info FAB ── */
.info-fab {
  position: absolute;
  bottom: 1rem; right: 1rem;
  width: 48px; height: 48px;
  background: var(--gold);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 3px 16px rgba(166,124,0,0.35);
  z-index: 5;
  transition: transform 0.15s;
}
.info-fab:active { transform: scale(0.93); }

/* ── Bottom Sheet ── */
.sheet-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(44,31,14,0.22);
  z-index: 10;
}
.sheet-backdrop.show { display: block; }
.sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 30px rgba(44,31,14,0.12);
  z-index: 20;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  max-height: 72dvh;
  display: flex;
  flex-direction: column;
  padding-bottom: calc(1rem + var(--safe-bottom));
}
.sheet.open { transform: translateY(0); }
.sheet-handle {
  flex-shrink: 0;
  display: flex;
  justify-content: center;
  padding: 0.75rem 0 0.35rem;
  cursor: pointer;
}
.sheet-handle::before {
  content: '';
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
}
.sheet-head {
  flex-shrink: 0;
  padding: 0 1.2rem 0.75rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 0.7rem;
}
.sheet-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
}
.badge {
  padding: 0.12rem 0.6rem;
  border-radius: 12px;
  font-size: 0.72rem;
  font-weight: 600;
}
.badge.yin  { background: #ffe0e0; color: #8b0000; }
.badge.yang { background: #ddeeff; color: #004080; }
.badge.qi   { background: #eeddf5; color: #5a0080; }
.badge.search { background: #fff3cc; color: #7a5000; }

.sheet-body {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.2rem;
  -webkit-overflow-scrolling: touch;
}
.sheet-body::-webkit-scrollbar { display: none; }
.info-row { margin-bottom: 1.1rem; }
.lbl {
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.25rem;
  display: flex; align-items: center; gap: 0.35rem;
}
.lbl::before {
  content:''; display:inline-block;
  width:12px; height:2px;
  background:var(--gold-lt); border-radius:1px;
}
.val { font-size: 0.92rem; color: var(--text); line-height: 1.65; }
.acu-grid { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.3rem; }
.acu-tag {
  padding: 0.2rem 0.55rem;
  background: rgba(166,124,0,0.07);
  border: 1px solid rgba(166,124,0,0.18);
  border-radius: 4px;
  font-size: 0.82rem;
  color: var(--gold);
}

/* ── Animations ── */
@keyframes drawPath {
  from { stroke-dashoffset: 3000; }
  to   { stroke-dashoffset: 0; }
}
.meridian-line {
  stroke-dasharray: 3000;
  stroke-dashoffset: 3000;
  animation: drawPath 1.1s ease-out forwards;
}
@keyframes pulse {
  0%,100% { r: 4; opacity: 0.9; }
  50%      { r: 6.5; opacity: 0.4; }
}
.acu-pulse { animation: pulse 2s ease-in-out infinite; }
</style>
</head>

<!-- Header -->
<div class="hdr">

  <div class="hdr-right">

      </svg>
      <input type="text" id="searchInput" placeholder="搜尋穴道…" autocomplete="off"/>

    <div class="suggest-box" id="suggestBox"></div>

</div>

<!-- Group Tabs -->
<div class="tabs-wrap" id="tabsWrap"></div>

<!-- Meridian Pills -->
<div class="pills-wrap" id="pillsWrap"></div>

  <div class="svg-wrap">
    <svg id="bodySvg" viewBox="0 0 893 1339" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

      <image id="bodyImg" href="body_front.png" x="0" y="0" width="893" height="1339" preserveAspectRatio="xMidYMid meet"/>

      <g id="meridianLayer"></g>

</div>

<!-- Bottom Sheet -->
<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">

  <div class="sheet-head" id="sheetHead">
    <span class="sheet-title">請選擇經脈</span>

  <div class="sheet-body" id="sheetBody">
    <p style="color:var(--text2);font-size:0.9rem;">從上方選擇經脈，或搜尋穴道名稱。</p>

</div>

// ══ 穴道查詢資料庫 ══
const acuDB = {};
meridians.forEach(m => {
  m.points.forEach(p => {
    if (!acuDB[p]) acuDB[p] = [];
    acuDB[p].push({ meridian: m.name, meridianKey: m.key, color: m.color });
  });
  // 補充 ac 座標的穴道
  if (m.ac) m.ac.forEach(([x,y,name]) => {
    if (name && !acuDB[name]) acuDB[name] = [];
    // 已由上面建立，這裡標記有座標
  });
});

// 建立穴道→座標的查詢
const acuCoords = {};
meridians.forEach(m => {
  if (m.ac) m.ac.forEach(([x,y,name]) => {
    if (name) acuCoords[name] = { x, y, meridianKey: m.key, color: m.color, isBack: false };
  });
  if (m.acBack) m.acBack.forEach(([x,y,name]) => {
    if (name) acuCoords[name] = { x, y, meridianKey: m.key, color: m.color, isBack: true };
  });
});

const byKey = {};
meridians.forEach(m => byKey[m.key] = m);

const groups = [
  { label:'手三陰', keys:['肺經','心經','心包經'] },
  { label:'手三陽', keys:['大腸經','小腸經','三焦經'] },
  { label:'足三陰', keys:['脾經','腎經','肝經'] },
  { label:'足三陽', keys:['胃經','膀胱經','膽經'] },
  { label:'奇經',   keys:['督脈','任脈'] }
];

let currentGroup = 0;
let currentKey = '肺經';
let currentView = 'front'; // 'front' | 'back'
let sheetOpen = false;
let searchMode = false;
let searchTarget = null;

// ══ Build Tabs ══
const tabsWrap = document.getElementById('tabsWrap');
groups.forEach((g, i) => {
  const t = document.createElement('button');
  t.className = 'tab' + (i===0?' active':'');
  t.textContent = g.label;
  t.addEventListener('click', () => switchGroup(i));
  tabsWrap.appendChild(t);
});

// ══ Build Pills ══
function renderPills(groupIdx) {
  const wrap = document.getElementById('pillsWrap');
  wrap.innerHTML = '';
  groups[groupIdx].keys.forEach(k => {
    const m = byKey[k];
    const p = document.createElement('button');
    p.className = 'pill' + (k===currentKey?' active':'');
    p.style.borderColor = k===currentKey ? m.color : 'transparent';
    p.innerHTML = `<span class="dot" style="background:${m.color}"></span>${m.name}`;
    p.addEventListener('click', () => { exitSearch(); selectMeridian(k); });
    wrap.appendChild(p);
  });
}

function switchGroup(i) {
  currentGroup = i;
  document.querySelectorAll('.tab').forEach((t,j) => t.classList.toggle('active', j===i));
  exitSearch();
  selectMeridian(groups[i].keys[0]);
  renderPills(i);
}

// ══ 正背面切換 ══
function setView(v) {
  currentView = v;
  document.getElementById('btnFront').classList.toggle('active', v==='front');
  document.getElementById('btnBack').classList.toggle('active', v==='back');
  document.getElementById('bodyImg').setAttribute('href', v==='front'?'body_front.png':'body_back.png');
  drawMeridian(byKey[currentKey]);
}

// ══ Select Meridian ══
function selectMeridian(key) {
  currentKey = key;
  searchMode = false;
  renderPills(currentGroup);
  const m = byKey[key];

  // 顯示背面切換按鈕（督脈/膀胱經）
  const hasBack = m.views && m.views.includes('back');
  document.getElementById('viewToggle').classList.toggle('show', hasBack);

  // 預設切到正面
  if (!hasBack || currentView === 'back') {
    currentView = 'front';
    document.getElementById('bodyImg').setAttribute('href','body_front.png');
    document.getElementById('btnFront').classList.add('active');
    document.getElementById('btnBack').classList.remove('active');
  }

  drawMeridian(m);
  updateSheet(m, null);
}

// ══ 繪製經脈 ══
function drawMeridian(m) {
  const layer = document.getElementById('meridianLayer');
  const acuLayer = document.getElementById('acuLayer');
  layer.innerHTML = '';
  acuLayer.innerHTML = '';

  const isBack = currentView === 'back';
  const pathD = isBack && m.pathBack ? m.pathBack : m.path;
  const acList = isBack && m.acBack ? m.acBack : (m.ac || []);

  // 發光底層
  const glow = mkPath(pathD, m.color, 14, 0.13);
  layer.appendChild(glow);

  // 主線
  const line = mkPath(pathD, m.color, 3.5, 0.92);
  line.setAttribute('class','meridian-line');
  if (isBack && m.pathBack) line.setAttribute('stroke-dasharray','16 8');
  layer.appendChild(line);

  // 若背面路徑，同時顯示正面頭頂小段
  if (isBack && m.pathBack && m.path) {
    const frontGlow = mkPath(m.path, m.color, 10, 0.1);
    layer.appendChild(frontGlow);
    const frontLine = mkPath(m.path, m.color, 3, 0.7);
    layer.appendChild(frontLine);
  }

  // 穴道點與標籤
  acList.forEach(([cx,cy,name,dir], i) => {
    drawAcuPoint(acuLayer, cx, cy, name, dir, m.color, i);
  });
}

function mkPath(d, color, width, opacity) {
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', d);
  p.setAttribute('stroke', color);
  p.setAttribute('stroke-width', width);
  p.setAttribute('fill','none');
  p.setAttribute('opacity', opacity);
  p.setAttribute('stroke-linecap','round');
  p.setAttribute('stroke-linejoin','round');
  return p;
}

function drawAcuPoint(layer, cx, cy, name, dir, color, idx) {
  // 外圈光暈
  const halo = document.createElementNS('http://www.w3.org/2000/svg','circle');
  halo.setAttribute('cx',cx); halo.setAttribute('cy',cy);
  halo.setAttribute('r',18); halo.setAttribute('fill',color); halo.setAttribute('opacity','0.10');
  layer.appendChild(halo);

  // 主點
  const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',cx); dot.setAttribute('cy',cy);
  dot.setAttribute('r',7); dot.setAttribute('fill',color);
  dot.setAttribute('class','acu-pulse');
  dot.style.animationDelay = `${idx*0.12}s`;
  layer.appendChild(dot);

  // 白點中心
  const inner = document.createElementNS('http://www.w3.org/2000/svg','circle');
  inner.setAttribute('cx',cx); inner.setAttribute('cy',cy);
  inner.setAttribute('r',3); inner.setAttribute('fill','white'); inner.setAttribute('opacity','0.8');
  layer.appendChild(inner);

  if (!name) return;
  const tx = dir==='l' ? cx-22 : cx+22;
  const ty = cy+5;
  const anchor = dir==='l' ? 'end' : 'start';

  // 標籤底框
  const bg = document.createElementNS('http://www.w3.org/2000/svg','text');
  bg.setAttribute('x',tx); bg.setAttribute('y',ty);
  bg.setAttribute('text-anchor',anchor);
  bg.setAttribute('font-size','22');
  bg.setAttribute('font-family','Noto Sans TC,sans-serif');
  bg.setAttribute('font-weight','700');
  bg.setAttribute('stroke','white');
  bg.setAttribute('stroke-width','6');
  bg.setAttribute('stroke-linejoin','round');
  bg.setAttribute('fill','white');
  bg.setAttribute('opacity','0.92');
  bg.textContent = name;
  layer.appendChild(bg);

  // 標籤主文字（深色，容易辨識）
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x',tx); txt.setAttribute('y',ty);
  txt.setAttribute('text-anchor',anchor);
  txt.setAttribute('font-size','22');
  txt.setAttribute('font-family','Noto Sans TC,sans-serif');
  txt.setAttribute('font-weight','700');
  txt.setAttribute('fill','#1a0a00');
  txt.setAttribute('opacity','0.92');
  txt.textContent = name;
  layer.appendChild(txt);
}

// ══ 更新 Sheet ══
function updateSheet(m, searchInfo) {
  const head = document.getElementById('sheetHead');
  const body = document.getElementById('sheetBody');

  if (searchInfo) {
    // 穴道搜尋模式
    head.innerHTML = `<span class="sheet-title">${searchInfo.name}</span><span class="badge search">穴道查詢</span>`;
    const meridianList = (acuDB[searchInfo.name]||[]).map(d =>
      `<span class="acu-tag" style="border-color:${d.color};color:${d.color}">${d.meridian}</span>`
    ).join('');
    body.innerHTML = `
      <div class="info-row">
        <div class="lbl">所屬經脈</div>
        <div class="acu-grid">${meridianList || '<span style="color:var(--text2)">查無資料</span>'}</div>
      </div>
      <div class="info-row">
        <div class="lbl">穴道位置</div>
        <div class="val">${searchInfo.location || '請參考專業中醫典籍'}</div>
      </div>
      <div class="info-row">
        <div class="lbl">主治功效</div>
        <div class="val">${searchInfo.function || '請參考專業中醫典籍'}</div>
      </div>`;
  } else {
    // 經脈模式
    const bc = m.type==='yin'?'yin':m.type==='yang'?'yang':'qi';
    const tl = m.type==='yin'?'陰經':m.type==='yang'?'陽經':'奇經';
    head.innerHTML = `<span class="sheet-title">${m.name}</span><span class="badge ${bc}">${tl}・${m.points.length} 穴</span>`;
    body.innerHTML = `
      <div class="info-row">
        <div class="lbl">起點穴道</div>
        <div class="val">${m.start}</div>
      </div>
      <div class="info-row">
        <div class="lbl">終點穴道</div>
        <div class="val">${m.end}</div>
      </div>
      <div class="info-row">
        <div class="lbl">走向說明</div>
        <div class="val">${m.direction}</div>
      </div>
      <div class="info-row">
        <div class="lbl">穴道列表</div>
        <div class="acu-grid">${m.points.map(p=>`<span class="acu-tag">${p}</span>`).join('')}</div>
      </div>`;
  }
}

// ══ 穴道搜尋 ══
const searchInput = document.getElementById('searchInput');
const suggestBox = document.getElementById('suggestBox');
const allAcuNames = [...new Set(meridians.flatMap(m => m.points))];

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { suggestBox.classList.remove('show'); return; }
  const hits = allAcuNames.filter(n => n.includes(q)).slice(0, 8);
  if (!hits.length) { suggestBox.classList.remove('show'); return; }
  suggestBox.innerHTML = hits.map(n => {
    const ms = (acuDB[n]||[]).map(d=>d.meridian).join('、');
    return `<div class="suggest-item" data-name="${n}">
      <span>${n}</span>
      <span class="s-meridian">${ms}</span>
    </div>`;
  }).join('');
  suggestBox.classList.add('show');
});

suggestBox.addEventListener('click', e => {
  const item = e.target.closest('.suggest-item');
  if (!item) return;
  const name = item.dataset.name;
  searchInput.value = name;
  suggestBox.classList.remove('show');
  doSearch(name);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    suggestBox.classList.remove('show');
    doSearch(searchInput.value.trim());
  }
  if (e.key === 'Escape') exitSearch();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.hdr-right')) suggestBox.classList.remove('show');
});

function doSearch(name) {
  if (!name || !acuDB[name]) return;
  searchMode = true;
  searchTarget = name;

  // 找出穴道座標
  const coord = acuCoords[name];
  const meridianKey = coord ? coord.meridianKey : (acuDB[name][0]?.meridianKey);
  const m = byKey[meridianKey];
  const color = coord ? coord.color : (m?.color || '#a67c00');

  // 切換到正確視圖
  const isBack = coord ? coord.isBack : false;
  if (isBack) {
    currentView = 'back';
    document.getElementById('bodyImg').setAttribute('href','body_back.png');
  } else {
    currentView = 'front';
    document.getElementById('bodyImg').setAttribute('href','body_front.png');
  }

  // 清空繪圖層，只高亮該穴道
  const layer = document.getElementById('meridianLayer');
  const acuLayer = document.getElementById('acuLayer');
  layer.innerHTML = '';
  acuLayer.innerHTML = '';

  if (coord) {
    // 大脈衝圈
    const ring = document.createElementNS('http://www.w3.org/2000/svg','circle');
    ring.setAttribute('cx', coord.x); ring.setAttribute('cy', coord.y);
    ring.setAttribute('r','22'); ring.setAttribute('fill', color); ring.setAttribute('opacity','0.18');
    ring.setAttribute('class','search-highlight');
    acuLayer.appendChild(ring);

    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', coord.x); dot.setAttribute('cy', coord.y);
    dot.setAttribute('r','10'); dot.setAttribute('fill', color);
    acuLayer.appendChild(dot);

    const inner = document.createElementNS('http://www.w3.org/2000/svg','circle');
    inner.setAttribute('cx', coord.x); inner.setAttribute('cy', coord.y);
    inner.setAttribute('r','4'); inner.setAttribute('fill','white');
    acuLayer.appendChild(inner);

    // 穴名大標籤
    const tx = coord.x + 28;
    ['white','#1a0a00'].forEach((fill, i) => {
      const t = document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x', tx); t.setAttribute('y', coord.y+7);
      t.setAttribute('font-size','28'); t.setAttribute('font-weight','800');
      t.setAttribute('font-family','Noto Sans TC,sans-serif');
      t.setAttribute('fill', fill);
      if (i===0) { t.setAttribute('stroke','white'); t.setAttribute('stroke-width','8'); }
      t.textContent = name;
      acuLayer.appendChild(t);
    });
  }

  updateSheet(m, { name, location: null, function: null });
  openSheet();
}

function exitSearch() {
  searchMode = false;
  searchTarget = null;
  searchInput.value = '';
  suggestBox.classList.remove('show');
}

// ══ Sheet Toggle ══
function openSheet() {
  sheetOpen = true;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('show');
}
function closeSheet() {
  sheetOpen = false;
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('show');
}
document.getElementById('infoFab').addEventListener('click', () => sheetOpen ? closeSheet() : openSheet());
document.getElementById('backdrop').addEventListener('click', closeSheet);
document.getElementById('sheetHandle').addEventListener('click', closeSheet);

// ══ Init ══
renderPills(0);
selectMeridian('肺經');
</script>
</body>
</html>
