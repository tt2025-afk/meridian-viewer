<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>十四經脈圖鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --bg2: #fffdf7;
    --border: #d4c4a0;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --text: #2c1f0e;
    --text2: #6b5a3e;
    --accent: #8b0000;
    --panel-bg: rgba(255,253,247,0.95);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(184,134,11,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(139,0,0,0.04) 0%, transparent 50%);
  }

header {
text-align: center;
padding: 2.5rem 2rem 1.5rem;
border-bottom: 1px solid var(–border);
background: linear-gradient(to bottom, #fffdf7, var(–bg));
}
header h1 {
font-size: 2.8rem;
font-weight: 300;
letter-spacing: 0.25em;
color: var(–gold);
text-shadow: 0 1px 2px rgba(184,134,11,0.15);
margin-bottom: 0.4rem;
}
header p {
font-family: ‘Noto Sans TC’, sans-serif;
font-size: 0.9rem;
color: var(–text2);
letter-spacing: 0.15em;
}

.layout {
display: grid;
grid-template-columns: 260px 1fr 320px;
gap: 0;
height: calc(100vh - 120px);
}

/* ─── 左欄：經脈列表 ─── */
.sidebar {
border-right: 1px solid var(–border);
overflow-y: auto;
background: var(–panel-bg);
padding: 1.2rem 0.8rem;
}
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb { background: var(–border); border-radius: 5px; }

.group-label {
font-family: ‘Noto Sans TC’, sans-serif;
font-size: 0.72rem;
font-weight: 500;
color: var(–text2);
letter-spacing: 0.18em;
padding: 0.8rem 0.8rem 0.4rem;
text-transform: uppercase;
border-top: 1px solid var(–border);
margin-top: 0.6rem;
}
.group-label:first-child { border-top: none; margin-top: 0; }

.m-btn {
display: flex;
align-items: center;
gap: 0.7rem;
width: 100%;
padding: 0.7rem 0.9rem;
background: transparent;
border: none;
border-radius: 6px;
cursor: pointer;
text-align: left;
transition: all 0.2s;
font-family: ‘Noto Serif TC’, serif;
}
.m-btn:hover { background: rgba(184,134,11,0.08); }
.m-btn.active { background: rgba(184,134,11,0.14); }
.m-dot {
width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
box-shadow: 0 0 5px currentColor;
}
.m-name { font-size: 0.95rem; font-weight: 600; color: var(–text); }
.m-sub  { font-size: 0.72rem; color: var(–text2); font-family: ‘Noto Sans TC’, sans-serif; }

/* ─── 中央：人體圖 ─── */
.body-panel {
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(160deg, #fffdf7 0%, #f7f0e3 100%);
position: relative;
overflow: hidden;
}
.body-panel::before {
content: ‘’;
position: absolute;
inset: 0;
background-image: radial-gradient(circle at center, rgba(184,134,11,0.04) 0%, transparent 70%);
}
.body-wrap {
position: relative;
width: 320px;
height: 680px;
}
#bodySvg {
width: 100%;
height: 100%;
filter: drop-shadow(0 8px 32px rgba(184,134,11,0.12));
}

/* ─── 右欄：詳細資訊 ─── */
.detail {
border-left: 1px solid var(–border);
background: var(–panel-bg);
padding: 2rem 1.5rem;
overflow-y: auto;
}
.detail::-webkit-scrollbar { width: 5px; }
.detail::-webkit-scrollbar-thumb { background: var(–border); border-radius: 5px; }

.detail-head {
margin-bottom: 1.5rem;
padding-bottom: 1.2rem;
border-bottom: 1px solid var(–border);
}
.detail-head h2 {
font-size: 1.6rem;
font-weight: 700;
color: var(–text);
margin-bottom: 0.3rem;
letter-spacing: 0.08em;
}
.badge {
display: inline-block;
padding: 0.15rem 0.7rem;
border-radius: 20px;
font-family: ‘Noto Sans TC’, sans-serif;
font-size: 0.75rem;
font-weight: 500;
letter-spacing: 0.06em;
}
.badge.yin  { background: #ffe0e0; color: #8b0000; }
.badge.yang { background: #e0eeff; color: #00368b; }
.badge.qi   { background: #f0e6ff; color: #5a008b; }

.info-row {
margin-bottom: 1.2rem;
}
.info-row .lbl {
font-family: ‘Noto Sans TC’, sans-serif;
font-size: 0.75rem;
color: var(–text2);
letter-spacing: 0.08em;
text-transform: uppercase;
margin-bottom: 0.3rem;
display: flex;
align-items: center;
gap: 0.4rem;
}
.info-row .lbl::before {
content: ‘’;
display: inline-block;
width: 14px; height: 2px;
background: var(–gold);
}
.info-row .val {
font-size: 0.95rem;
color: var(–text);
line-height: 1.7;
font-family: ‘Noto Sans TC’, sans-serif;
}

.acupoints-grid {
display: flex;
flex-wrap: wrap;
gap: 0.4rem;
margin-top: 0.3rem;
}
.acu-tag {
display: inline-block;
padding: 0.2rem 0.6rem;
background: rgba(184,134,11,0.08);
border: 1px solid rgba(184,134,11,0.2);
border-radius: 4px;
font-size: 0.82rem;
color: var(–gold);
font-family: ‘Noto Sans TC’, sans-serif;
transition: all 0.15s;
cursor: default;
}
.acu-tag:hover {
background: rgba(184,134,11,0.18);
color: var(–text);
}

/* Acu-point pulse */
@keyframes pulse {
0%   { r: 4; opacity: 0.9; }
50%  { r: 6; opacity: 0.5; }
100% { r: 4; opacity: 0.9; }
}
.acu-pulse { animation: pulse 2s ease-in-out infinite; }

/* path draw-on */
@keyframes drawPath {
from { stroke-dashoffset: 2000; }
to   { stroke-dashoffset: 0; }
}
.meridian-line {
stroke-dasharray: 2000;
stroke-dashoffset: 2000;
animation: drawPath 1.2s ease-out forwards;
}
</style>

</head>

const groups = [

  { label: '手臂三陽經', keys: ['大腸經','小腸經','三焦經'] },

  { label: '奇經（任督）', keys: ['督脈','任脈'] }
];

const sidebar = document.getElementById('sidebar');
const byKey = {};
meridians.forEach(m => byKey[m.key] = m);

groups.forEach(g => {
  const lbl = document.createElement('div');
  lbl.className = 'group-label';
  lbl.textContent = g.label;
  sidebar.appendChild(lbl);
  g.keys.forEach(k => {
    const m = byKey[k];
    const btn = document.createElement('button');
    btn.className = 'm-btn';
    btn.dataset.key = k;
    const badgeClass = m.type === 'yin' ? 'yin' : m.type === 'yang' ? 'yang' : 'qi';
    const typeLabel = m.type === 'yin' ? '陰經' : m.type === 'yang' ? '陽經' : '奇經';
    btn.innerHTML = `
      <span class="m-dot" style="background:${m.color};"></span>
      <div>
        <div class="m-name">${m.name}</div>
        <div class="m-sub">${typeLabel}</div>
      </div>`;
    btn.addEventListener('click', () => selectMeridian(k));
    sidebar.appendChild(btn);
  });
});

// ─── 選擇經脈 ─────────────────────────────────────────────────────────────
function selectMeridian(key) {
  const m = byKey[key];
  // 更新按鈕狀態
  document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.m-btn[data-key="${key}"]`).classList.add('active');

  // 繪製路徑
  const layer = document.getElementById('meridianLayer');
  const acuLayer = document.getElementById('acuLayer');
  layer.innerHTML = '';
  acuLayer.innerHTML = '';

  // 發光底層
  const glow = document.createElementNS('http://www.w3.org/2000/svg','path');
  glow.setAttribute('d', m.path);
  glow.setAttribute('stroke', m.color);
  glow.setAttribute('stroke-width', '8');
  glow.setAttribute('fill', 'none');
  glow.setAttribute('opacity', '0.18');
  glow.setAttribute('stroke-linecap', 'round');
  glow.setAttribute('stroke-linejoin', 'round');
  layer.appendChild(glow);

  // 主線
  const line = document.createElementNS('http://www.w3.org/2000/svg','path');
  line.setAttribute('d', m.path);
  line.setAttribute('stroke', m.color);
  line.setAttribute('stroke-width', '2.8');
  line.setAttribute('fill', 'none');
  line.setAttribute('opacity', '0.92');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-linejoin', 'round');
  line.setAttribute('class', 'meridian-line');
  layer.appendChild(line);

  // 穴道點
  m.acuCoords.forEach(([cx,cy], i) => {
    const outer = document.createElementNS('http://www.w3.org/2000/svg','circle');
    outer.setAttribute('cx', cx);
    outer.setAttribute('cy', cy);
    outer.setAttribute('r', 6);
    outer.setAttribute('fill', m.color);
    outer.setAttribute('opacity', '0.15');
    acuLayer.appendChild(outer);

    const inner = document.createElementNS('http://www.w3.org/2000/svg','circle');
    inner.setAttribute('cx', cx);
    inner.setAttribute('cy', cy);
    inner.setAttribute('r', 3.5);
    inner.setAttribute('fill', m.color);
    inner.setAttribute('class', 'acu-pulse');
    inner.style.animationDelay = `${i * 0.12}s`;
    acuLayer.appendChild(inner);
  });

  // 更新詳細面板
  const badgeClass = m.type === 'yin' ? 'yin' : m.type === 'yang' ? 'yang' : 'qi';
  const typeLabel = m.type === 'yin' ? '陰經' : m.type === 'yang' ? '陽經' : '奇經';
  const tagsHtml = m.points.map(p => `<span class="acu-tag">${p}</span>`).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-head">
      <h2>${m.name}</h2>
      <span class="badge ${badgeClass}">${typeLabel}</span>
    </div>
    <div class="info-row">
      <div class="lbl">起點穴道</div>
      <div class="val">${m.start}</div>
    </div>
    <div class="info-row">
      <div class="lbl">終點穴道</div>
      <div class="val">${m.end}</div>
    </div>
    <div class="info-row">
      <div class="lbl">走向說明</div>
      <div class="val">${m.direction}</div>
    </div>
    <div class="info-row">
      <div class="lbl">穴道列表（共 ${m.points.length} 穴）</div>
      <div class="acupoints-grid">${tagsHtml}</div>
    </div>`;
}

// 預設選擇肺經
selectMeridian('肺經');
